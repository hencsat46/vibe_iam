version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iam
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - /var/run/postgresql:/var/run/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iam"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres
      DB_USER: iam
      DB_PASSWORD: iam
      DB_NAME: iam
      GRPC_ADDR: ":50051"
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
